<div class="relative mb-16 flex flex-col gap-8 md:flex-row">

    <!-- Timeline Circle -->

    <div class="hidden md:flex h-14 w-14 items-center justify-center rounded-full shadow-xl"
        [ngClass]="experience().color">

        <i class="text-xl text-white" [class]="experience().icon">

        </i>

    </div>

    <!-- Experience Card -->

    <div
        class="w-full rounded-3xl border border-slate-800 bg-slate-950 p-8 shadow-xl transition-all duration-500 hover:-translate-y-2 hover:border-cyan-500 hover:shadow-cyan-500/20">

        <!-- Header -->

        <div class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">

            <div>

                <h3 class="text-3xl font-bold text-white">

                    {{ experience().role }}

                </h3>

                <p class="mt-3 text-xl font-medium text-cyan-400">

                    {{ experience().company }}

                </p>

            </div>

            <span class="rounded-full bg-cyan-600/20 px-5 py-2 text-sm font-medium text-cyan-400">

                {{ experience().duration }}

            </span>

        </div>

        <!-- Responsibilities -->

        <div class="mt-8">

            <ul class="space-y-4">

                @for(item of experience().description; track item){

                <li class="flex items-start gap-4">

                    <i class="fa-solid fa-circle-check mt-1 text-green-400">

                    </i>

                    <span class="leading-8 text-slate-300">

                        {{ item }}

                    </span>

                </li>

                }

            </ul>

        </div>

        <!-- Technology Chips -->

        <div class="mt-10 flex flex-wrap gap-3">

            @for(skill of experience().technologies; track skill){

            <app-technology-chip [technology]="skill">
            </app-technology-chip>

            }

        </div>
    </div>

</div>
