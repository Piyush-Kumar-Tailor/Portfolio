<!-- EXPERIENCE HEADER -->

<div class="mb-20 text-center">

    <p class="mb-4 text-sm font-semibold uppercase tracking-[0.3em] text-blue-400">
        {{ subtitle() }}
    </p>

    <h2 class="text-5xl font-bold text-white">
        {{ title() }}
        <span class="bg-linear-to-r from-blue-500 to-cyan-400 bg-clip-text text-transparent">
            {{ highlight() }}
        </span>
    </h2>

    <p class="mx-auto mt-8 max-w-4xl text-lg leading-9 text-slate-400">
        {{ description() }}
    </p>

</div>
