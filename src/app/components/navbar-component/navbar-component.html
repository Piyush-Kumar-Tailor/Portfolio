<header
    class="fixed inset-x-0 top-0 z-50 border-b border-white/10 bg-slate-950/80 shadow-lg shadow-black/10 backdrop-blur-xl">

    <nav
        class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">

                <!-- Logo -->

        <a
            href="#home"
            class="text-xl font-bold tracking-wide text-white transition duration-300 hover:text-blue-400 sm:text-2xl">

            Piyush<span class="text-blue-500">.</span>

        </a>

            <!-- Desktop Navigation -->

        <ul
            class="hidden items-center gap-5 text-sm font-medium text-slate-300 xl:gap-7 lg:flex">

            <li>
                <a href="#home"
                    class="transition duration-300 hover:text-blue-400">

                    Home

                </a>
            </li>

            <li>
                <a href="#about"
                    class="transition duration-300 hover:text-blue-400">

                    About

                </a>
            </li>

            <li>
                <a href="#skills"
                    class="transition duration-300 hover:text-blue-400">

                    Skills

                </a>
            </li>

            <li>
                <a href="#experience"
                    class="transition duration-300 hover:text-blue-400">

                    Experience

                </a>
            </li>

            <li>
                <a href="#projects"
                    class="transition duration-300 hover:text-blue-400">

                    Projects

                </a>
            </li>

            <li>
                <a href="#education"
                    class="transition duration-300 hover:text-blue-400">

                    Education

                </a>
            </li>

            <li>
                <a href="#contact"
                    class="transition duration-300 hover:text-blue-400">

                    Contact

                </a>
            </li>

        </ul>

                <!-- Resume Button -->

        <div class="hidden lg:block">

            <a
                href="resume/Piyush_Kumar_Tailor_Resume.pdf"
                download
                class="inline-flex items-center gap-2 rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white transition-all duration-300 hover:-translate-y-1 hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-500/30">

                <i class="fa-solid fa-download"></i>

                Resume

            </a>

        </div>

            <!-- Mobile Menu Button -->

        <button
            type="button"
            (click)="toggleMenu()"
            class="flex h-11 w-11 items-center justify-center rounded-xl border border-slate-700 text-white transition-all duration-300 hover:border-blue-500 hover:bg-slate-800 lg:hidden">

            @if(!menuOpen()){

            <i class="fa-solid fa-bars text-xl"></i>

            }@else{

            <i class="fa-solid fa-xmark text-xl"></i>

            }

        </button>

    </nav>

            <!-- Mobile Menu -->

    @if(menuOpen()){

    <div
        class="border-t border-slate-800 bg-slate-950/95 backdrop-blur-xl lg:hidden">

        <div
            class="mx-4 my-4 rounded-2xl border border-slate-800 bg-slate-900 p-5 shadow-2xl">

            <div class="flex flex-col gap-2">

                <a
                    href="#home"
                    (click)="closeMenu()"
                    class="rounded-xl px-4 py-3 text-slate-300 transition-all duration-300 hover:bg-slate-800 hover:text-blue-400">

                    Home

                </a>

                <a
                    href="#about"
                    (click)="closeMenu()"
                    class="rounded-xl px-4 py-3 text-slate-300 transition-all duration-300 hover:bg-slate-800 hover:text-blue-400">

                    About

                </a>

                <a
                    href="#skills"
                    (click)="closeMenu()"
                    class="rounded-xl px-4 py-3 text-slate-300 transition-all duration-300 hover:bg-slate-800 hover:text-blue-400">

                    Skills

                </a>

                <a
                    href="#experience"
                    (click)="closeMenu()"
                    class="rounded-xl px-4 py-3 text-slate-300 transition-all duration-300 hover:bg-slate-800 hover:text-blue-400">

                    Experience

                </a>

                <a
                    href="#projects"
                    (click)="closeMenu()"
                    class="rounded-xl px-4 py-3 text-slate-300 transition-all duration-300 hover:bg-slate-800 hover:text-blue-400">

                    Projects

                </a>

                <a
                    href="#education"
                    (click)="closeMenu()"
                    class="rounded-xl px-4 py-3 text-slate-300 transition-all duration-300 hover:bg-slate-800 hover:text-blue-400">

                    Education

                </a>

                <a
                    href="#contact"
                    (click)="closeMenu()"
                    class="rounded-xl px-4 py-3 text-slate-300 transition-all duration-300 hover:bg-slate-800 hover:text-blue-400">

                    Contact

                </a>

                <a
                    href="resume/Piyush_Kumar_Tailor_Resume.pdf"
                    download
                    class="mt-3 inline-flex items-center justify-center gap-2 rounded-xl bg-blue-600 py-3 font-semibold text-white transition-all duration-300 hover:bg-blue-700">

                    <i class="fa-solid fa-download"></i>

                    Download Resume

                </a>

            </div>

        </div>

    </div>

    }

</header>
