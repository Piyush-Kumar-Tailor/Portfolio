<div class="mt-6 flex gap-2">

    @if(project().github){

    <a
        [href]="project().github"
        target="_blank"
        class="flex flex-1 items-center justify-center gap-2 rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">

        <i class="fab fa-github"></i>

        GitHub

    </a>

    } @else {

    <button
        disabled
        class="flex flex-1 items-center justify-center gap-2 rounded-lg bg-slate-800 px-3 py-2 text-sm font-semibold text-slate-500">

        <i class="fab fa-github"></i>

        Coming Soon

    </button>

    }

    @if(project().demo){

    <a
        [href]="project().demo"
        target="_blank"
        class="flex flex-1 items-center justify-center gap-2 rounded-lg border border-blue-500 px-3 py-2 text-sm font-semibold text-blue-400 transition hover:bg-blue-600 hover:text-white">

        <i class="fa-solid fa-arrow-up-right-from-square"></i>

        Live Demo

    </a>

    } @else {

    <button
        disabled
        class="flex flex-1 items-center justify-center gap-2 rounded-lg border border-slate-700 px-3 py-2 text-sm font-semibold text-slate-500">

        <i class="fa-solid fa-clock"></i>

        Coming Soon

    </button>

    }

</div>
