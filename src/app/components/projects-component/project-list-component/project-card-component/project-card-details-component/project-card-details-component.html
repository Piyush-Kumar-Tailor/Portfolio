<!-- Title -->

<h3 class="text-xl font-bold tracking-tight text-white">

    {{ project().title }}

</h3>

<!-- Description -->

<p class="mt-3 line-clamp-3 text-sm leading-6 text-slate-400">

    {{ project().description }}

</p>

<!-- Tech Stack -->

<div class="mt-5 flex flex-wrap gap-2">

    @for(tech of project().techStack.slice(0,5); track tech){

    <span class="rounded-full border border-slate-700 bg-slate-800 px-2.5 py-1 text-[11px] font-medium text-blue-400">

        {{ tech }}

    </span>

    }

</div>

<!-- Features -->

<div class="mt-5">

    <h4 class="mb-3 text-sm font-semibold uppercase tracking-wide text-white">

        Key Features

    </h4>

    <ul class="space-y-2">

        @for(feature of visibleFeatures(); track feature){

        <li class="flex items-center gap-2 text-sm text-slate-300">

            <i class="fa-solid fa-circle-check text-green-500"></i>

            {{ feature }}

        </li>

        }

    </ul>

    @if(project().features.length > 2){

    <button type="button" (click)="toggleFeatures()"
        class="mt-3 text-sm font-medium text-blue-400 transition cursor-pointer hover:text-blue-300">

        {{ showAllFeatures() ? 'Show Less' : '+' + (project().features.length - 3) + ' More' }}

    </button>

    }

</div>
