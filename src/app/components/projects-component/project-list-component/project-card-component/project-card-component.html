@if(project()){

<div
    class="group flex h-full flex-col overflow-hidden rounded-2xl border border-slate-800 bg-slate-900 transition-all duration-300 hover:-translate-y-2 hover:border-blue-500 hover:shadow-xl hover:shadow-blue-500/20">

    <app-project-card-preview-component
        [project]="project()!">
    </app-project-card-preview-component>

    <div class="flex flex-1 flex-col p-5">

        <app-project-card-details-component
            [project]="project()!">
        </app-project-card-details-component>

        <div class="mt-auto">

            <app-project-card-actions-component
                [project]="project()!">
            </app-project-card-actions-component>

        </div>

    </div>

</div>

}@else{

<app-project-card-skeleton-component/>

}
