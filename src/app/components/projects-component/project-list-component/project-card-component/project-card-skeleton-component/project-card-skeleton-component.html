<div class="flex h-full flex-col overflow-hidden rounded-3xl border border-slate-800 bg-slate-900">

    <!-- Video Skeleton -->

    <div class="relative h-56 w-full overflow-hidden bg-slate-800">

        <div class="absolute inset-0 animate-pulse bg-linear-to-r from-slate-800 via-slate-700 to-slate-800">
        </div>

    </div>

    <!-- Content -->

    <div class="flex flex-1 flex-col p-6">

        <!-- Title -->

        <div class="h-7 w-2/3 animate-pulse rounded-lg bg-slate-800">
        </div>

        <!-- Description -->

        <div class="mt-5 space-y-3">

            <div class="h-4 w-full animate-pulse rounded bg-slate-800"></div>

            <div class="h-4 w-11/12 animate-pulse rounded bg-slate-800"></div>

            <div class="h-4 w-4/5 animate-pulse rounded bg-slate-800"></div>

        </div>

        <!-- Tech Stack -->

        <div class="mt-6">

            <div class="mb-3 h-4 w-24 animate-pulse rounded bg-slate-800">
            </div>

            <div class="flex flex-wrap gap-2">

                @for(item of [1,2,3,4,5]; track item){

                <div class="h-8 w-20 animate-pulse rounded-full bg-slate-800">
                </div>

                }

            </div>

        </div>

        <!-- Features -->

        <div class="mt-6">

            <div class="mb-3 h-4 w-28 animate-pulse rounded bg-slate-800">
            </div>

            <div class="space-y-3">

                @for(item of [1,2,3,4]; track item){

                <div class="flex items-center gap-3">

                    <div class="h-4 w-4 animate-pulse rounded-full bg-slate-800">
                    </div>

                    <div class="h-4 flex-1 animate-pulse rounded bg-slate-800">
                    </div>

                </div>

                }

            </div>

        </div>

        <!-- Buttons -->

        <div class="mt-auto flex gap-3 pt-6">

            <div class="h-11 flex-1 animate-pulse rounded-xl bg-slate-800">
            </div>

            <div class="h-11 flex-1 animate-pulse rounded-xl bg-slate-800">
            </div>

        </div>

    </div>

</div>
